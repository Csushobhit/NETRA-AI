<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>NETRA-AI — IP Detail</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/dashboard.css}">
    <link rel="stylesheet" th:href="@{/css/admin.css}">

    <style>
        .detail-page {
            padding: 32px 48px 56px;
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            gap: 22px;
        }

        .detail-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 26px 30px;
        }

        .ip-title {
            font-size: 28px;
            font-weight: 700;
            font-family: 'Courier New', monospace;
            color: #67e8f9;
        }
        body.light .ip-title { color: #0284c7; }

        .back-btn {
            padding: 8px 18px;
            border-radius: 50px;
            border: 1px solid var(--glass-bd);
            background: var(--glass-bg);
            text-decoration: none;
            font-size: 12px;
            color: #94a3b8;
        }

        .grid-2 {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 18px;
        }

        .info-card { padding: 22px 26px; }

        .info-title {
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 1px;
            text-transform: uppercase;
            color: #94a3b8;
            margin-bottom: 14px;
        }

        .info-row {
            display: flex;
            justify-content: space-between;
            padding: 10px 0;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }

        .info-key {
            font-size: 11px;
            color: #6b7280;
            text-transform: uppercase;
        }

        .info-val {
            font-size: 13px;
            color: #e2e8f0;
            text-align: right;
        }

        body.light .info-val { color: #1e293b; }

        .explanation {
            margin-top: 10px;
            font-size: 13px;
            line-height: 1.7;
            color: #cbd5e1;
        }

        .metrics {
            display: grid;
            grid-template-columns: repeat(5,1fr);
            gap: 14px;
        }

        .metric {
            padding: 16px;
            text-align: center;
        }

        .metric-val {
            font-size: 20px;
            font-weight: 700;
            color: #a78bfa;
        }

        .metric-label {
            font-size: 10px;
            color: #6b7280;
            text-transform: uppercase;
        }

        .action-card { padding: 22px 26px; }

        .action-row {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-top: 10px;
        }

        .run-btn {
            padding: 9px 20px;
            border-radius: 50px;
            border: none;
            font-weight: 600;
            cursor: pointer;
            background: linear-gradient(135deg, var(--accent-1), var(--accent-2));
            color: white;
        }

        .fb-btn {
            padding: 8px 16px;
            border-radius: 50px;
            border: 1px solid var(--glass-bd);
            background: var(--glass-bg);
            color: #94a3b8;
            cursor: pointer;
        }
    </style>
</head>

<body>

<!-- NAVBAR -->
<nav class="nav">
    <a class="logo-text" href="/dashboard">NETRA-AI</a>

    <div class="nav-right">
        <div class="nav-icons">
            <span>📊</span>
            <span>🔔</span>
            <span>⚙️</span>
        </div>

        <div class="user-menu" id="userMenu">
            <div class="user-badge" onclick="toggleMenu()">
                <span th:text="${isAdmin} ? '👑' : '👤'"></span>
                <span th:text="${username}"></span>
                <span>▾</span>
            </div>

            <div class="dropdown">
                <div th:if="${isAdmin}">
                    <div class="dropdown-header">Admin Panel</div>
                    <a class="dropdown-item" href="/admin/pending">User Approvals</a>
                    <a class="dropdown-item" href="/admin-ui/ti">TI Panel</a>
                    <div class="dropdown-divider"></div>
                </div>

                <a class="dropdown-item" href="/dashboard">Dashboard</a>

                <div class="dropdown-divider"></div>

                <form th:action="@{/logout}" method="post">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                    <button class="dropdown-item danger">Logout</button>
                </form>
            </div>
        </div>

        <div class="theme-toggle" onclick="toggleTheme()">
            <div class="toggle-circle" id="toggleCircle">🌙</div>
        </div>
    </div>
</nav>

<!-- PAGE -->
<div class="detail-page">

    <!-- HEADER -->
    <div class="card detail-header">
        <div class="ip-title" th:text="${ip}">IP</div>
        <a href="/dashboard" class="back-btn">← Back to Alerts</a>
    </div>

    <!-- DECISION + TI -->
    <div class="grid-2">

        <!-- Decision Summary -->
        <div class="card info-card">
            <div class="info-title">Decision Summary</div>

            <div class="info-row">
                <div class="info-key">Attack Type</div>
                <div class="info-val" th:text="${data[0]['attack_type']}"></div>
            </div>

            <div class="info-row">
                <div class="info-key">Risk Score</div>
                <div class="info-val" th:text="${data[0]['risk_score']}"></div>
            </div>

            <div class="info-row">
                <div class="info-key">Recommended Action</div>
                <div class="info-val" th:text="${data[0]['action']}"></div>
            </div>

            <div class="info-title" style="margin-top:16px;">Explanation</div>
            <div class="explanation" th:text="${data[0]['explanation']}"></div>
        </div>

        <!-- Threat Intelligence -->
        <div class="card info-card">
            <div class="info-title">Threat Intelligence</div>

            <div class="info-row">
                <div class="info-key">Label</div>
                <div class="info-val"
                     th:text="${data[0]['ti_label'] != null ? data[0]['ti_label'] : 'Not Checked'}"></div>
            </div>

            <div class="info-row">
                <div class="info-key">Confidence</div>
                <div class="info-val" th:text="${data[0]['ti_confidence']}"></div>
            </div>

            <div class="info-row">
                <div class="info-key">Reasoning</div>
                <div class="info-val" th:text="${data[0]['ti_reasoning']}"></div>
            </div>

            <form method="post" action="/run-ti" style="margin-top:16px;">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                <input type="hidden" name="ip" th:value="${ip}" />
                <button class="run-btn">Run TI</button>
            </form>
        </div>
    </div>

    <!-- METRICS -->
    <div class="metrics">
        <div class="card metric">
            <div class="metric-val" th:text="${data[0]['request_freq']}"></div>
            <div class="metric-label">Request Freq</div>
        </div>

        <div class="card metric">
            <div class="metric-val" th:text="${data[0]['failed_ratio']}"></div>
            <div class="metric-label">Failed Ratio</div>
        </div>

        <div class="card metric">
            <div class="metric-val" th:text="${data[0]['unique_ports']}"></div>
            <div class="metric-label">Ports</div>
        </div>

        <div class="card metric">
            <div class="metric-val" th:text="${data[0]['anomaly_score']}"></div>
            <div class="metric-label">Anomaly</div>
        </div>

        <div class="card metric">
            <div class="metric-val"
                 th:text="${data[0]['off_hour']} ? 'Yes' : 'No'"></div>
            <div class="metric-label">Off Hour</div>
        </div>
    </div>

    <!-- FEEDBACK -->
    <div class="card action-card">
        <div class="info-title">User Feedback</div>

        <form method="post" action="/feedback">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
            <input type="hidden" name="ip" th:value="${ip}" />

            <div class="action-row">
                <button name="feedback" value="correct" class="fb-btn">Correct</button>
                <button name="feedback" value="incorrect" class="fb-btn">Incorrect</button>
                <button name="feedback" value="unknown" class="fb-btn">Unknown</button>
            </div>
        </form>
    </div>

</div>

<script>
function toggleMenu() {
    document.getElementById('userMenu').classList.toggle('open');
}

document.addEventListener('click', function(e) {
    const menu = document.getElementById('userMenu');
    if (menu && !menu.contains(e.target)) menu.classList.remove('open');
});

let dark = true;
function toggleTheme() {
    dark = !dark;
    const circle = document.getElementById('toggleCircle');

    if (!dark) {
        document.body.classList.add('light');
        circle.innerHTML = '☀️';
        circle.style.transform = 'translateX(30px)';
    } else {
        document.body.classList.remove('light');
        circle.innerHTML = '🌙';
        circle.style.transform = 'translateX(0)';
    }
}
</script>

</body>
</html>
